name: mailtemplatehub

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mailtemplatehub
      POSTGRES_USER: mth
      POSTGRES_PASSWORD: mth_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mth -d mailtemplatehub"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/mth-private local/mth-public local/mth-snapshots &&
      mc anonymous set download local/mth-public &&
      exit 0"

  # Provider doubles (Google / Microsoft OAuth + send endpoints) for tests and offline dev.
  wiremock:
    image: wiremock/wiremock:3.13.0
    ports:
      - "9091:8080"
    volumes:
      - ./tests/providerdoubles:/home/wiremock:ro
    command: ["--global-response-templating", "--verbose"]

volumes:
  pgdata:
  miniodata:
